<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance & Sustainability Fabric Development</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-dark:#0a0d14; --bg-card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.08);
    --border2:rgba(255,255,255,0.12); --text-primary:#e2e8f0; --text-muted:#64748b; --text-dim:#94a3b8;
  }
  html { scroll-behavior: smooth; }
  body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg-dark); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background: radial-gradient(ellipse 800px 600px at 15% 10%, rgba(139,92,246,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 700px 500px at 85% 20%, rgba(6,182,212,0.10)  0%, transparent 60%),
                radial-gradient(ellipse 600px 400px at 50% 90%, rgba(59,130,246,0.08) 0%, transparent 60%); }

  @keyframes fadeInDown { from{opacity:0;transform:translateY(-24px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeInUp   { from{opacity:0;transform:translateY(24px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn     { from{opacity:0} to{opacity:1} }
  @keyframes pulse-dot  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }
  @keyframes today-glow { 0%,100%{box-shadow:0 0 6px 2px rgba(245,158,11,0.6)} 50%{box-shadow:0 0 12px 4px rgba(245,158,11,0.9)} }
  @keyframes barGrow      { from{width:0!important} }
  @keyframes phaseBarGrow { from{width:0} }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ── LOADING OVERLAY ── */
  #loadingOverlay { position:fixed; inset:0; z-index:999; background:var(--bg-dark); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
  #loadingOverlay.hidden { display:none; }
  .ld-spinner { width:52px; height:52px; border:4px solid rgba(139,92,246,0.2); border-top-color:#8b5cf6; border-radius:50%; animation:spin .8s linear infinite; }
  .ld-text { font-size:.9rem; color:var(--text-muted); }

  #app { position:relative; z-index:1; display:flex; flex-direction:column; width:100%; min-height:100vh; }
  .app-wrapper { position:relative; z-index:1; padding:0 0 40px; }

  .header { background:linear-gradient(135deg,rgba(139,92,246,0.25) 0%,rgba(6,182,212,0.15) 50%,rgba(59,130,246,0.20) 100%); border-bottom:1px solid var(--border2); padding:22px 32px 18px; display:flex; align-items:center; justify-content:space-between; animation:fadeInDown .7s ease both; position:relative; overflow:hidden; }
  .header::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(139,92,246,0.08),transparent 60%); pointer-events:none; }
  .header-left h1 { font-size:1.65rem; font-weight:700; letter-spacing:-0.02em; background:linear-gradient(135deg,#c4b5fd 0%,#67e8f9 60%,#93c5fd 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .header-right { display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .today-badge { display:flex; align-items:center; gap:8px; background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.35); border-radius:999px; padding:6px 14px; font-size:.78rem; font-weight:600; color:#fbbf24; }
  .pulse-dot { width:8px; height:8px; border-radius:50%; background:#f59e0b; animation:pulse-dot 1.6s ease-in-out infinite; }
  .live-badge { display:flex; align-items:center; gap:6px; background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.3); border-radius:999px; padding:5px 12px; font-size:.73rem; font-weight:700; color:#6ee7b7; letter-spacing:.03em; }
  .live-dot { width:7px; height:7px; border-radius:50%; background:#10b981; animation:pulse-dot 2s ease-in-out infinite; }

  .kpi-section { padding:28px 32px 0; display:grid; grid-template-columns:repeat(5,1fr); gap:16px; animation:fadeInUp .7s .15s ease both; }
  .kpi-card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:18px 20px 16px; position:relative; overflow:hidden; backdrop-filter:blur(12px); transition:transform .25s,box-shadow .25s,border-color .25s; cursor:default; }
  .kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:14px 14px 0 0; }
  .kpi-card:nth-child(1)::before{background:linear-gradient(90deg,#8b5cf6,#a855f7)}
  .kpi-card:nth-child(2)::before{background:linear-gradient(90deg,#10b981,#34d399)}
  .kpi-card:nth-child(3)::before{background:linear-gradient(90deg,#0ea5e9,#06b6d4)}
  .kpi-card:nth-child(4)::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
  .kpi-card:nth-child(5)::before{background:linear-gradient(90deg,#ec4899,#f472b6)}
  .kpi-card:hover { transform:translateY(-4px); box-shadow:0 16px 40px rgba(0,0,0,0.35); border-color:var(--border2); }
  .kpi-label { font-size:.72rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
  .kpi-value { font-size:2rem; font-weight:800; line-height:1; background:linear-gradient(135deg,#e2e8f0,#94a3b8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .kpi-ring-card { display:flex; align-items:center; gap:12px; }
  .kpi-ring-card .kpi-value { font-size:1.4rem; }
  .ring-svg { width:60px; height:60px; flex-shrink:0; }
  .ring-track { fill:none; stroke:rgba(255,255,255,0.08); stroke-width:6; }
  .ring-fill  { fill:none; stroke-width:6; stroke-linecap:round; transform-origin:center; transform:rotate(-90deg); stroke-dasharray:314; stroke-dashoffset:314; transition:stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1) .4s; stroke:url(#ringGrad); }
  .ring-text  { font-size:12px; font-weight:700; fill:#e2e8f0; text-anchor:middle; dominant-baseline:middle; }

  .charts-section { padding:24px 32px 0; display:grid; grid-template-columns:35% 65%; gap:16px; animation:fadeInUp .7s .3s ease both; }
  .chart-card { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:24px; backdrop-filter:blur(12px); }
  .chart-card-title { font-size:.8rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); margin-bottom:20px; display:flex; align-items:center; gap:8px; }
  .chart-card-title::before { content:''; width:3px; height:14px; border-radius:2px; background:linear-gradient(180deg,#8b5cf6,#06b6d4); }
  .doughnut-wrapper { position:relative; width:180px; height:180px; margin:0 auto 20px; }
  .doughnut-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }
  .doughnut-center .big-num { font-size:2.2rem; font-weight:800; color:#e2e8f0; line-height:1; }
  .doughnut-center .small-label { font-size:.65rem; color:var(--text-muted); margin-top:2px; }
  .donut-legend { display:flex; flex-direction:column; gap:8px; }
  .legend-item { display:flex; align-items:center; justify-content:space-between; font-size:.78rem; }
  .legend-dot-label { display:flex; align-items:center; gap:8px; color:var(--text-dim); }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .legend-count { font-weight:700; color:var(--text-primary); }
  .phase-bars { display:flex; flex-direction:column; gap:14px; }
  .phase-row { display:flex; flex-direction:column; gap:6px; }
  .phase-row-header { display:flex; align-items:center; justify-content:space-between; }
  .phase-badge { font-size:.7rem; font-weight:700; letter-spacing:.06em; padding:3px 9px; border-radius:999px; }
  .phase-bar-track { height:10px; border-radius:999px; background:rgba(255,255,255,0.06); overflow:hidden; }
  .phase-bar-fill { height:100%; border-radius:999px; animation:phaseBarGrow .9s cubic-bezier(.4,0,.2,1) .5s both; }
  .phase-pct { font-size:.75rem; font-weight:700; color:var(--text-dim); }

  .gantt-section { padding:24px 32px 0; animation:fadeInUp .7s .45s ease both; }
  .gantt-section-title { font-size:.8rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); display:flex; align-items:center; gap:8px; margin-bottom:16px; }
  .gantt-section-title::before { content:''; width:3px; height:14px; border-radius:2px; background:linear-gradient(180deg,#8b5cf6,#06b6d4); }
  .gantt-outer { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; overflow:hidden; backdrop-filter:blur(12px); }
  .gantt-grid  { display:flex; min-height:100px; }
  .gantt-left  { flex-shrink:0; width:400px; border-right:1px solid var(--border); display:flex; flex-direction:column; }
  .gantt-left-header { display:grid; grid-template-columns:36px 1fr 86px 86px 80px; height:72px; align-items:center; padding:0 12px; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.03); }
  .gantt-left-header span { font-size:.68rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--text-muted); padding:0 4px; }
  .gantt-task-row { display:grid; grid-template-columns:36px 1fr 86px 86px 80px; height:48px; align-items:center; padding:0 12px; border-bottom:1px solid rgba(255,255,255,0.04); transition:background .15s; position:relative; }
  .gantt-task-row:nth-child(odd){background:rgba(255,255,255,0.015)} .gantt-task-row:nth-child(even){background:transparent}
  .gantt-task-row:hover{background:rgba(255,255,255,0.05)}
  .task-num { font-size:.72rem; color:var(--text-muted); font-weight:600; padding:0 4px; }
  .task-name-cell { display:flex; flex-direction:column; gap:3px; padding:0 4px; min-width:0; }
  .task-name-text { font-size:.78rem; font-weight:600; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .task-date-cell { font-size:.68rem; color:var(--text-muted); padding:0 4px; }
  .status-pill { display:inline-flex; align-items:center; font-size:.62rem; font-weight:700; letter-spacing:.04em; padding:3px 8px; border-radius:999px; white-space:nowrap; }
  .status-done      {background:rgba(16,185,129,0.15);color:#6ee7b7;border:1px solid rgba(16,185,129,0.3)}
  .status-inprogress{background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.3)}
  .status-upcoming  {background:rgba(100,116,139,0.15);color:#94a3b8;border:1px solid rgba(100,116,139,0.3)}
  .gantt-right { flex:1; overflow-x:auto; overflow-y:hidden; scrollbar-width:thin; scrollbar-color:rgba(139,92,246,0.4) transparent; }
  .gantt-right::-webkit-scrollbar{height:6px} .gantt-right::-webkit-scrollbar-track{background:transparent} .gantt-right::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.4);border-radius:3px}
  .gantt-timeline { position:relative; }
  .tl-header-months { display:flex; height:32px; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.03); }
  .tl-month-cell { flex-shrink:0; height:32px; display:flex; align-items:center; padding-left:8px; font-size:.7rem; font-weight:700; text-transform:uppercase; color:var(--text-dim); border-right:1px solid var(--border); }
  .tl-header-weeks { display:flex; height:40px; border-bottom:1px solid var(--border2); background:rgba(255,255,255,0.03); }
  .tl-week-cell { flex-shrink:0; height:40px; display:flex; align-items:center; justify-content:center; font-size:.65rem; color:var(--text-muted); border-right:1px solid rgba(255,255,255,0.04); position:relative; }
  .tl-week-cell.today-week{background:rgba(245,158,11,0.07);color:#fbbf24;font-weight:700}
  .tl-week-cell.today-week::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:#f59e0b}
  .tl-rows { position:relative; }
  .tl-task-row { height:48px; position:relative; border-bottom:1px solid rgba(255,255,255,0.04); }
  .tl-task-row:nth-child(odd){background:rgba(255,255,255,0.015)} .tl-task-row:nth-child(even){background:transparent}
  .gantt-bar-wrap { position:absolute; top:50%; transform:translateY(-50%); height:26px; border-radius:6px; overflow:hidden; cursor:pointer; transition:filter .2s,transform .2s; }
  .gantt-bar-wrap:hover{filter:brightness(1.2);transform:translateY(-50%) scaleY(1.08)}
  .gantt-bar-ghost    { position:absolute; inset:0; border-radius:6px; opacity:.25; }
  .gantt-bar-progress { position:absolute; top:0; left:0; bottom:0; border-radius:6px; animation:barGrow .9s cubic-bezier(.4,0,.2,1) .6s both; }
  .gantt-bar-label    { position:absolute; inset:0; display:flex; align-items:center; padding:0 8px; font-size:.65rem; font-weight:700; color:rgba(255,255,255,0.95); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; z-index:2; pointer-events:none; text-shadow:0 1px 3px rgba(0,0,0,0.5); }
  .today-line { position:absolute; top:0; bottom:0; width:2px; background:#f59e0b; z-index:20; pointer-events:none; animation:today-glow 2s ease-in-out infinite; }
  .today-line-label { position:absolute; top:-1px; left:50%; transform:translateX(-50%); background:#f59e0b; color:#0a0d14; font-size:.58rem; font-weight:800; padding:2px 5px; border-radius:3px; white-space:nowrap; }

  .gantt-toolbar { display:flex; align-items:center; gap:10px; padding:12px 20px; border-bottom:1px solid var(--border); }
  .btn-add { padding:8px 18px; border-radius:8px; border:none; cursor:pointer; background:linear-gradient(135deg,#8b5cf6,#06b6d4); color:#fff; font-weight:700; font-size:.82rem; transition:opacity .2s,transform .2s; }
  .btn-add:hover{opacity:.85;transform:translateY(-1px)}
  .btn-tool { padding:7px 14px; border-radius:8px; cursor:pointer; background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--text-dim); font-size:.78rem; font-weight:600; transition:background .2s,color .2s; }
  .btn-tool:hover{background:rgba(255,255,255,0.12);color:var(--text-primary)}
  .btn-tool:disabled{opacity:.4;cursor:not-allowed}

  .row-actions { display:none; gap:4px; align-items:center; position:absolute; right:6px; top:50%; transform:translateY(-50%); }
  .gantt-task-row:hover .row-actions{display:flex}
  .btn-edit-row,.btn-del-row { width:26px; height:26px; border-radius:6px; border:none; cursor:pointer; font-size:.75rem; display:flex; align-items:center; justify-content:center; transition:background .15s; }
  .btn-edit-row{background:rgba(59,130,246,0.2);color:#60a5fa} .btn-edit-row:hover{background:rgba(59,130,246,0.4)}
  .btn-del-row {background:rgba(239,68,68,0.2);color:#f87171}  .btn-del-row:hover{background:rgba(239,68,68,0.4)}

  .gantt-tooltip { position:fixed; z-index:9999; pointer-events:none; background:rgba(15,20,30,0.97); border:1px solid rgba(255,255,255,0.12); border-radius:10px; padding:12px 14px; min-width:200px; backdrop-filter:blur(20px); box-shadow:0 20px 60px rgba(0,0,0,0.6); opacity:0; transition:opacity .15s; font-size:.75rem; }
  .gantt-tooltip.visible{opacity:1}
  .tt-title{font-size:.82rem;font-weight:700;color:#e2e8f0;margin-bottom:8px}
  .tt-row{display:flex;justify-content:space-between;gap:16px;margin-bottom:4px}
  .tt-key{color:var(--text-muted)} .tt-val{color:var(--text-primary);font-weight:600}
  .tt-progress-bar{height:4px;border-radius:999px;background:rgba(255,255,255,0.1);margin-top:8px;overflow:hidden}
  .tt-progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#10b981,#34d399)}

  .modal-overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .25s; }
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal-card { background:#111827; border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:28px; width:460px; max-width:96vw; box-shadow:0 24px 80px rgba(0,0,0,0.6); transform:translateY(20px) scale(.97); transition:transform .25s; }
  .modal-overlay.open .modal-card{transform:translateY(0) scale(1)}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
  .modal-header h3{font-size:1rem;font-weight:700}
  .modal-close{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;background:rgba(255,255,255,0.08);color:#94a3b8;font-size:.9rem;transition:background .15s}
  .modal-close:hover{background:rgba(255,255,255,0.15);color:#e2e8f0}
  .modal-form{display:flex;flex-direction:column;gap:16px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-group{display:flex;flex-direction:column;gap:6px}
  .form-group label{font-size:.75rem;font-weight:600;color:#64748b;letter-spacing:.06em;text-transform:uppercase}
  .form-group input,.form-group select{padding:9px 12px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#e2e8f0;font-size:.85rem;outline:none;transition:border-color .2s,background .2s}
  .form-group input:focus,.form-group select:focus{border-color:#8b5cf6;background:rgba(139,92,246,0.08)}
  .form-group select option{background:#1e293b}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.4)}
  .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
  .btn-cancel{padding:9px 20px;border-radius:8px;border:1px solid var(--border);background:transparent;color:#94a3b8;cursor:pointer;font-size:.82rem;transition:background .15s}
  .btn-cancel:hover{background:rgba(255,255,255,0.06)}
  .btn-submit{padding:9px 22px;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:#fff;font-weight:700;font-size:.82rem;transition:opacity .2s,transform .15s}
  .btn-submit:hover{opacity:.85;transform:translateY(-1px)}
  .btn-submit:disabled{opacity:.5;pointer-events:none}

  .footer{padding:20px 32px 0;animation:fadeIn .7s .6s ease both}
  .footer-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px 24px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
  .footer-label{font-size:.68rem;color:var(--text-muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-right:4px}
  .footer-items{display:flex;gap:20px;flex-wrap:wrap}
  .footer-item{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--text-dim)}
  .footer-swatch{width:22px;height:8px;border-radius:4px}

  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:12px 22px;font-size:.84rem;font-weight:600;color:#e2e8f0;box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;pointer-events:none;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  @media print {
    @page{size:A4 landscape;margin:8mm 10mm}
    *,*::before,*::after{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
    html{zoom:.72}
    body{background:#0a0d14!important;overflow:visible!important}
    body::before{position:absolute!important;background:radial-gradient(ellipse 800px 600px at 15% 10%,rgba(139,92,246,0.18) 0%,transparent 60%),radial-gradient(ellipse 700px 500px at 85% 20%,rgba(6,182,212,0.14) 0%,transparent 60%),#0a0d14!important}
    .gantt-toolbar,.modal-overlay,.gantt-tooltip,.toast,.row-actions{display:none!important}
    #app,.app-wrapper{overflow:visible!important}
    .gantt-right{overflow:visible!important}
    .gantt-timeline{width:auto!important}
    .gantt-bar-progress,.phase-bar-fill{animation:none!important}
    .ring-fill{transition:none!important}
  }
</style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div id="loadingOverlay">
  <div class="ld-spinner"></div>
  <p class="ld-text">Firebase에 연결하는 중...</p>
</div>

<div id="app">
  <div class="app-wrapper" style="width:100%">
    <header class="header">
      <div class="header-left">
        <h1 id="headerTitle">Performance &amp; Sustainability Fabric Development</h1>
      </div>
      <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div><span>실시간 연결됨</span></div>
        <div class="today-badge"><div class="pulse-dot"></div><span id="todayBadgeText"></span></div>
      </div>
    </header>

    <section class="kpi-section">
      <div class="kpi-card"><div class="kpi-label">총 작업 수</div><div class="kpi-value" id="kpiTotal">0</div></div>
      <div class="kpi-card"><div class="kpi-label">완료</div><div class="kpi-value" id="kpiDone">0</div></div>
      <div class="kpi-card"><div class="kpi-label">진행중</div><div class="kpi-value" id="kpiProgress">0</div></div>
      <div class="kpi-card"><div class="kpi-label">예정</div><div class="kpi-value" id="kpiUpcoming">0</div></div>
      <div class="kpi-card kpi-ring-card">

    <section class="gantt-section">

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc,
         doc, onSnapshot, setDoc, getDoc, serverTimestamp, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase 초기화
const firebaseConfig = {
  apiKey:            "AIzaSyA8BHDuy2WjbT45xL8ck1bP2jJum0vsKeM",
  authDomain:        "performance-637e9.firebaseapp.com",
  projectId:         "performance-637e9",
  storageBucket:     "performance-637e9.firebasestorage.app",
  messagingSenderId: "135259315399",
  appId:             "1:135259315399:web:977e6d0be7774880edf2e2"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── 상수
const PX_PER_DAY = 8, MS_PER_DAY = 86400000, WEEK_PX = PX_PER_DAY * 7;
const PHASES = {
  PL:{label:'기획',  grad:['#8b5cf6','#a855f7'],badgeBg:'rgba(139,92,246,0.2)',badgeText:'#a78bfa',name:'PL 기획'},
  DS:{label:'설계',  grad:['#f59e0b','#fbbf24'],badgeBg:'rgba(245,158,11,0.2)',badgeText:'#fcd34d',name:'DS 설계'},
  DV:{label:'개발',  grad:['#0ea5e9','#06b6d4'],badgeBg:'rgba(6,182,212,0.2)', badgeText:'#67e8f9',name:'DV 개발'},
  TS:{label:'테스트',grad:['#10b981','#34d399'],badgeBg:'rgba(16,185,129,0.2)',badgeText:'#6ee7b7',name:'TS 테스트'},
  DP:{label:'배포',  grad:['#ef4444','#f87171'],badgeBg:'rgba(239,68,68,0.2)', badgeText:'#fca5a5',name:'DP 배포'},
  CL:{label:'완료후',grad:['#ec4899','#f472b6'],badgeBg:'rgba(236,72,153,0.2)',badgeText:'#f9a8d4',name:'CL 완료후'},
};
const phaseOrder = ['PL','DS','DV','TS','DP','CL'];

// ── 상태
let cfg = { projTitle:'Performance & Sustainability Fabric Development', projStart:'2026-04-01', projEnd:'2026-07-31', todayOverride:null };
let tasks = [];
let editingFid = null;   // Firestore document id
let donutChartInst = null;

// ── 헬퍼
function getToday()     { return cfg.todayOverride ? new Date(cfg.todayOverride) : new Date(); }
function getProjStart() { return new Date(cfg.projStart); }
function getProjEnd()   { return new Date(cfg.projEnd); }
function taskDates(t)   { return { ...t, startD: new Date(t.start), endD: new Date(t.end) }; }
function progress(t) {
  const td = taskDates(t);
  if (!td.startD || !td.endD || isNaN(td.startD) || isNaN(td.endD)) return 0;
  return Math.min(1, Math.max(0, (getToday() - td.startD) / (td.endD - td.startD)));
}
function statusOf(t) {
  const p = progress(t);
  if (p >= 1) return { label:'완료',   cls:'status-done' };
  if (p >  0) return { label:'진행중', cls:'status-inprogress' };
  return              { label:'예정',   cls:'status-upcoming' };
}
function fmtDate(d)     { return (!d||isNaN(d)) ? '' : `${d.getMonth()+1}/${d.getDate()}`; }
function fmtDateFull(d) { return (!d||isNaN(d)) ? '' : `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }

let toastTimer = null;
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isError ? 'rgba(239,68,68,0.4)' : 'rgba(255,255,255,0.15)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Firestore: 설정 로드/저장
async function loadCfg() {
  const snap = await getDoc(doc(db, 'config', 'project'));
  if (snap.exists()) cfg = { ...cfg, ...snap.data() };
}
async function saveCfg() {
  await setDoc(doc(db, 'config', 'project'), cfg);
}

// ── Firestore: 실시간 리스너 (핵심!)
function subscribeAll() {
  const q = query(collection(db, 'tasks'), orderBy('createdAt', 'asc'));
  onSnapshot(q, snap => {
    tasks = snap.docs.map((d, i) => ({
      fid:   d.id,
      id:    i + 1,
      name:  d.data().name  || '',
      phase: d.data().phase || 'DV',
      owner: d.data().owner || '',
      start: d.data().start || '',
      end:   d.data().end   || '',
    }));
    render();
    document.getElementById('loadingOverlay').classList.add('hidden');
  }, err => {
    console.error(err);
    showToast('⚠️ Firebase 연결 오류: ' + err.message, true);
  });

  // 설정도 실시간 동기화
  onSnapshot(doc(db, 'config', 'project'), snap => {
    if (snap.exists()) { cfg = { ...cfg, ...snap.data() }; render(); }
  });
}

// ── Firestore CRUD
async function fsCreate(data) {
  await addDoc(collection(db, 'tasks'), { ...data, createdAt: serverTimestamp() });
}
async function fsUpdate(fid, data) {
  await updateDoc(doc(db, 'tasks', fid), data);
}
async function fsDelete(fid) {
  await deleteDoc(doc(db, 'tasks', fid));
}

// ── 렌더
function render() {
  const todayD = getToday(), projStartD = getProjStart(), projEndD = getProjEnd();

  document.getElementById('headerTitle').textContent    = cfg.projTitle;
  document.getElementById('todayBadgeText').textContent = `오늘: ${fmtDateFull(todayD)}`;

  const done     = tasks.filter(t => progress(t) >= 1).length;
  const inprog   = tasks.filter(t => { const p = progress(t); return p > 0 && p < 1; }).length;
  const upcoming = tasks.filter(t => progress(t) <= 0).length;
  const avgPct   = tasks.length ? Math.round(tasks.reduce((s,t) => s + progress(t), 0) / tasks.length * 100) : 0;

  document.getElementById('kpiTotal').textContent    = tasks.length;
  document.getElementById('kpiDone').textContent     = done;
  document.getElementById('kpiProgress').textContent = inprog;
  document.getElementById('kpiUpcoming').textContent = upcoming;
  document.getElementById('kpiRateText').textContent = avgPct + '%';
  document.getElementById('ringLabel').textContent   = avgPct + '%';

  const circ = document.getElementById('ringCircle');
  const C = 2 * Math.PI * 40;
  circ.style.strokeDasharray = C; circ.style.strokeDashoffset = C;
  requestAnimationFrame(() => {
    circ.style.transition = 'stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1) .1s';
    circ.style.strokeDashoffset = C * (1 - avgPct / 100);
  });

  // 도넛
  document.getElementById('donutCenter').textContent = done;
  if (donutChartInst) { donutChartInst.destroy(); donutChartInst = null; }
  const dw = document.querySelector('.doughnut-wrapper');
  const nc = document.createElement('canvas'); nc.id = 'donutChart';
  dw.replaceChild(nc, document.getElementById('donutChart'));
  donutChartInst = new Chart(nc.getContext('2d'), {
    type: 'doughnut',
    data: { labels:['완료','진행중','예정'], datasets:[{ data:[done,inprog,upcoming],
      backgroundColor:['rgba(16,185,129,0.8)','rgba(59,130,246,0.8)','rgba(100,116,139,0.5)'],
      borderColor:['#10b981','#3b82f6','#475569'], borderWidth:2, hoverOffset:6 }] },
    options: { cutout:'72%', responsive:true, maintainAspectRatio:true,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed}개`},
        backgroundColor:'rgba(15,20,30,0.95)', borderColor:'rgba(255,255,255,0.12)',
        borderWidth:1, titleColor:'#e2e8f0', bodyColor:'#94a3b8', padding:10, cornerRadius:8 }},
      animation:{animateRotate:true,duration:1200} }
  });

  const legendEl = document.getElementById('donutLegend'); legendEl.innerHTML = '';
  [{label:'완료',count:done,color:'#10b981'},{label:'진행중',count:inprog,color:'#3b82f6'},{label:'예정',count:upcoming,color:'#475569'}]
    .forEach(d => legendEl.insertAdjacentHTML('beforeend',
      `<div class="legend-item"><div class="legend-dot-label"><div class="legend-dot" style="background:${d.color}"></div><span>${d.label}</span></div><span class="legend-count">${d.count}개</span></div>`));

  // 단계 진행률
  const pbe = document.getElementById('phaseBars'); pbe.innerHTML = '';
  phaseOrder.forEach(ph => {
    const pt = tasks.filter(t => t.phase === ph); if (!pt.length) return;
    const pct = Math.round(pt.reduce((s,t) => s + progress(t), 0) / pt.length * 100);
    const info = PHASES[ph];
    pbe.insertAdjacentHTML('beforeend',
      `<div class="phase-row"><div class="phase-row-header"><span class="phase-badge" style="background:${info.badgeBg};color:${info.badgeText}">${info.name}</span><span class="phase-pct">${pct}%</span></div><div class="phase-bar-track"><div class="phase-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${info.grad[0]},${info.grad[1]})"></div></div></div>`);
  });

  // 간트 왼쪽
  const lr = document.getElementById('ganttLeftRows'); lr.innerHTML = '';
  tasks.forEach((t, idx) => {
    const st = statusOf(t), ph = PHASES[t.phase] || PHASES['DV'], td = taskDates(t);
    const div = document.createElement('div'); div.className = 'gantt-task-row'; div.dataset.fid = t.fid;
    div.innerHTML = `<span class="task-num">${idx+1}</span>
      <div class="task-name-cell"><span class="task-name-text">${t.name}</span>
        <span class="phase-badge" style="font-size:.6rem;padding:1px 6px;border-radius:999px;background:${ph.badgeBg};color:${ph.badgeText};width:fit-content">${ph.name}</span></div>
      <span class="task-date-cell">${fmtDate(td.startD)}</span>
      <span class="task-date-cell">${fmtDate(td.endD)}</span>
      <span class="status-pill ${st.cls}">${st.label}</span>
      <div class="row-actions">
        <button class="btn-edit-row" data-fid="${t.fid}" title="수정">✏</button>
        <button class="btn-del-row"  data-fid="${t.fid}" title="삭제">🗑</button>
      </div>`;
    lr.appendChild(div);
  });
  lr.querySelectorAll('.btn-edit-row').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    const tk = tasks.find(t => t.fid === b.dataset.fid); if (tk) openModal(tk);
  }));
  lr.querySelectorAll('.btn-del-row').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation(); removeTask(b.dataset.fid);
  }));

  // 타임라인
  const totalDays = (projEndD - projStartD) / MS_PER_DAY;
  const tlEl = document.getElementById('ganttTimeline'); tlEl.style.width = (totalDays * PX_PER_DAY) + 'px';
  const weeks = []; let cur = new Date(projStartD);
  while (cur <= projEndD) { weeks.push(new Date(cur)); cur = new Date(cur.getTime() + 7 * MS_PER_DAY); }

  const mEl = document.getElementById('tlMonths'); mEl.innerHTML = '';
  const mm = {}; weeks.forEach(w => { const k = `${w.getFullYear()}-${w.getMonth()}`; if (!mm[k]) mm[k]={date:w,count:0}; mm[k].count++; });
  Object.values(mm).forEach(m => {
    const names=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const c = document.createElement('div'); c.className = 'tl-month-cell';
    c.style.width = (m.count * WEEK_PX) + 'px'; c.textContent = `${m.date.getFullYear()} ${names[m.date.getMonth()]}`;
    mEl.appendChild(c);
  });

  const wEl = document.getElementById('tlWeeks'); wEl.innerHTML = '';
  const todayX = (getToday() - projStartD) / MS_PER_DAY * PX_PER_DAY;
  weeks.forEach(w => {
    const we = new Date(w.getTime() + 7*MS_PER_DAY - 1);
    const itw = getToday() >= w && getToday() <= we;
    const c = document.createElement('div'); c.className = 'tl-week-cell' + (itw ? ' today-week' : '');
    c.style.width = WEEK_PX + 'px'; c.textContent = `${w.getMonth()+1}/${w.getDate()}`; wEl.appendChild(c);
  });

  const trEl = document.getElementById('tlRows'); trEl.innerHTML = '';
  const tip = document.getElementById('ganttTooltip');
  tasks.forEach(t => {
    const td = taskDates(t), row = document.createElement('div'); row.className = 'tl-task-row';
    const left = (td.startD - projStartD) / MS_PER_DAY * PX_PER_DAY;
    const width = (td.endD - td.startD) / MS_PER_DAY * PX_PER_DAY;
    const pct = progress(t), ph = PHASES[t.phase] || PHASES['DV'];
    const grad = `linear-gradient(90deg,${ph.grad[0]},${ph.grad[1]})`;
    const wrap = document.createElement('div'); wrap.className = 'gantt-bar-wrap';
    wrap.style.cssText = `left:${left}px;width:${Math.max(width,4)}px;`;
    wrap.innerHTML = `<div class="gantt-bar-ghost" style="background:${grad}"></div><div class="gantt-bar-progress" style="width:${pct*100}%;background:${grad}"></div><div class="gantt-bar-label">${t.name}</div>`;
    wrap.addEventListener('mouseenter', e => {
      document.getElementById('ttTitle').textContent = t.name;
      document.getElementById('ttOwner').textContent = t.owner || '미지정';
      document.getElementById('ttStart').textContent = fmtDateFull(td.startD);
      document.getElementById('ttEnd').textContent   = fmtDateFull(td.endD);
      document.getElementById('ttPhase').textContent = ph.name;
      document.getElementById('ttPct').textContent   = Math.round(pct*100) + '%';
      document.getElementById('ttBar').style.width    = (pct*100) + '%';
      document.getElementById('ttBar').style.background = grad;
      tip.classList.add('visible'); posTooltip(e);
    });
    wrap.addEventListener('mousemove', posTooltip);
    wrap.addEventListener('mouseleave', () => tip.classList.remove('visible'));
    row.appendChild(wrap); trEl.appendChild(row);
  });

  document.getElementById('todayLine').style.left = todayX + 'px';

  const fEl = document.getElementById('footerLegend'); fEl.innerHTML = '';
  phaseOrder.forEach(ph => { const info = PHASES[ph]; fEl.insertAdjacentHTML('beforeend',
    `<div class="footer-item"><div class="footer-swatch" style="background:linear-gradient(90deg,${info.grad[0]},${info.grad[1]})"></div><span>${info.name}</span></div>`); });
  fEl.insertAdjacentHTML('beforeend', `<div class="footer-item" style="margin-left:16px"><div class="footer-swatch" style="background:#f59e0b"></div><span>오늘 기준선</span></div>`);

  const right = document.getElementById('ganttRight');
  right.scrollLeft = Math.max(0, todayX - right.offsetWidth / 2);
}

function posTooltip(e) {
  const tip = document.getElementById('ganttTooltip');
  const tw = tip.offsetWidth||220, th = tip.offsetHeight||130;
  let x = e.clientX+14, y = e.clientY-th/2;
  if (x+tw > window.innerWidth-8)  x = e.clientX-tw-14;
  if (y < 8) y = 8; if (y+th > window.innerHeight-8) y = window.innerHeight-th-8;
  tip.style.left = x+'px'; tip.style.top = y+'px';
}

// ── 모달
function openModal(task=null) {
  editingFid = task ? task.fid : null;
  document.getElementById('modalTitle').textContent = task ? '작업 수정' : '작업 추가';
  document.getElementById('f-name').value  = task?.name  || '';
  document.getElementById('f-phase').value = task?.phase || 'DV';
  document.getElementById('f-owner').value = task?.owner || '';
  document.getElementById('f-start').value = task?.start || '';
  document.getElementById('f-end').value   = task?.end   || '';
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingFid = null; }

document.getElementById('taskForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = {
    name:  document.getElementById('f-name').value.trim(),
    phase: document.getElementById('f-phase').value,
    owner: document.getElementById('f-owner').value.trim(),
    start: document.getElementById('f-start').value,
    end:   document.getElementById('f-end').value,
  };
  if (!fd.name || !fd.start || !fd.end) return;
  if (new Date(fd.end) <= new Date(fd.start)) { showToast('⚠️ 완료일은 시작일 이후여야 합니다', true); return; }
  document.getElementById('btnSubmit').disabled = true;
  try {
    if (editingFid) { await fsUpdate(editingFid, fd); showToast('✅ 수정되었습니다'); }
    else            { await fsCreate(fd);              showToast('✅ 작업이 추가되었습니다'); }
    closeModal();
  } catch(err) {
    document.getElementById('btnSubmit').disabled = false;
    showToast('⚠️ 저장 실패: ' + err.message, true);
  }
});

async function removeTask(fid) {
  if (!confirm('이 작업을 삭제하시겠습니까?')) return;
  try { await fsDelete(fid); showToast('🗑 삭제되었습니다'); }
  catch(err) { showToast('⚠️ 삭제 실패: ' + err.message, true); }
}

document.getElementById('btnAddTask').addEventListener('click', () => openModal());
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('btnCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===document.getElementById('modalOverlay')) closeModal(); });

// ── 프로젝트 설정
document.getElementById('btnSettings').addEventListener('click', () => {
  document.getElementById('s-title').value = cfg.projTitle;
  document.getElementById('s-start').value = cfg.projStart;
  document.getElementById('s-end').value   = cfg.projEnd;
  document.getElementById('s-today').value = cfg.todayOverride || '';
  document.getElementById('settingsOverlay').classList.add('open');
});
document.getElementById('settingsSave').addEventListener('click', async () => {
  cfg.projTitle     = document.getElementById('s-title').value.trim() || cfg.projTitle;
  cfg.projStart     = document.getElementById('s-start').value || cfg.projStart;
  cfg.projEnd       = document.getElementById('s-end').value   || cfg.projEnd;
  cfg.todayOverride = document.getElementById('s-today').value || null;
  await saveCfg();    // Firestore에 저장 → 모든 사용자에게 즉시 반영
  document.getElementById('settingsOverlay').classList.remove('open');
  showToast('✅ 설정이 저장되었습니다 (전체 공유됨)');
});
document.getElementById('settingsClose').addEventListener('click',  () => document.getElementById('settingsOverlay').classList.remove('open'));
document.getElementById('settingsCancel').addEventListener('click', () => document.getElementById('settingsOverlay').classList.remove('open'));
document.getElementById('settingsOverlay').addEventListener('click', e => { if(e.target===document.getElementById('settingsOverlay')) document.getElementById('settingsOverlay').classList.remove('open'); });

// ── PDF
document.getElementById('btnExport').addEventListener('click', () => window.print());

// ── 시작
subscribeAll();
</script>
</body>
</html>
